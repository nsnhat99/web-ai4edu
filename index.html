    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
    <style>
      /* ===== BASE ===== */
      * { box-sizing: border-box; }

      body {
        font-family: 'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
        background-color: #071437;
        color: #cbd5e1;
        overflow-x: hidden;
        margin: 0;
      }

      /* ===== ANIMATED BACKGROUND ===== */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 30%, rgba(30,58,138,0.4) 0%, transparent 60%),
          radial-gradient(ellipse 60% 80% at 80% 70%, rgba(37,99,235,0.15) 0%, transparent 50%),
          radial-gradient(ellipse 50% 50% at 50% 50%, rgba(96,165,250,0.05) 0%, transparent 70%);
        animation: bgPulse 20s ease-in-out infinite;
      }

      @keyframes bgPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      /* Grid pattern overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); }
        25% { transform: translateY(-20px) translateX(10px); }
        50% { transform: translateY(-10px) translateX(-5px); }
        75% { transform: translateY(-30px) translateX(15px); }
      }

      @keyframes scrollBounce {
        0%, 100% { transform: translateY(0); opacity: 1; }
        50% { transform: translateY(6px); opacity: 0.3; }
      }

      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out;
      }

      .animate-float {
        animation: float 15s ease-in-out infinite;
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #071437; }
      ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #2563eb; }

      /* ===== SELECTION ===== */
      ::selection {
        background: rgba(37,99,235,0.3);
        color: #e0ecff;
      }

      /* ===== SMOOTH SCROLL ===== */
      html { scroll-behavior: smooth; }
    </style>
